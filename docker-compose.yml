services:
  web:
    build: .
    container_name: timesaver-web
    ports:
      - "5000:5000"
    environment:
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY:-change-me}
      DATABASE_PATH: /app/instance/timesaver.db
      APPOINTMENTS_API_URL: http://api:5001/appointments
    volumes:
      - ./instance:/app/instance
    depends_on:
      - api

  api:
    build: .
    container_name: timesaver-api
    command: ["python", "api/app.py"]
    ports:
      - "5001:5001"
    environment:
      API_PORT: 5001
      APPOINTMENTS_FILE: /app/api/appointments.json
    volumes:
      - ./:/app
