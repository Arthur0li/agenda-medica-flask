<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TimeSaver | Agenda Médica</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://unpkg.com/tabulator-tables@6.3.1/dist/css/tabulator_bootstrap5.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="page-agenda">
  <div class="top-accent"></div>

  <header class="topbar">
    <div class="brand-inline">
      <div class="brand-mark brand-mark-small" aria-hidden="true">
        <svg viewBox="0 0 64 64" width="40" height="40">
          <rect x="4" y="4" width="56" height="56" rx="14" fill="#16a3a1"/>
          <circle cx="32" cy="32" r="18" fill="white" opacity=".15"/>
          <path d="M24.5 32l5.5 5.5 10-10" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="32" cy="20" r="2" fill="white" opacity=".65"/>
          <circle cx="32" cy="44" r="2" fill="white" opacity=".65"/>
          <circle cx="20" cy="32" r="2" fill="white" opacity=".65"/>
          <circle cx="44" cy="32" r="2" fill="white" opacity=".65"/>
        </svg>
      </div>
      <div>
        <h1><span>Time</span>Saver</h1>
        <p>Agenda Médica</p>
      </div>
    </div>

    <div class="topbar-user">
      <div class="user-meta">
        <strong>{{ user_name|title }}</strong>
        <span id="current-date"></span>
      </div>
      <a class="btn-outline" href="{{ url_for('main.logout') }}">Sair</a>
    </div>
  </header>

  <main class="agenda-page">
    <section class="hero">
      <div>
        <h2>Agenda do Dia</h2>
        <p>Consulte e acompanhe os agendamentos médicos.</p>
      </div>

      <div class="stats" id="stats">
        <article class="stat-card">
          <strong id="stat-total">0</strong>
          <span>Total</span>
        </article>
        <article class="stat-card stat-success">
          <strong id="stat-confirmado">0</strong>
          <span>Confirmados</span>
        </article>
        <article class="stat-card stat-warning">
          <strong id="stat-aguardando">0</strong>
          <span>Aguardando</span>
        </article>
        <article class="stat-card stat-danger">
          <strong id="stat-cancelado">0</strong>
          <span>Cancelados</span>
        </article>
      </div>
    </section>

    <section class="toolbar card">
      <div class="search-box">
        <span class="search-icon">⌕</span>
        <input id="searchInput" type="text" placeholder="Buscar por paciente, CPF, médico ou convênio..." />
      </div>
      
    </section>

    <section class="card table-card">
      <div id="table-messages" class="table-message hidden"></div>
      <div id="appointments-table"></div>
    </section>
  </main>

  <footer class="site-footer">timersaver.com.br</footer>

  <script src="https://unpkg.com/tabulator-tables@6.3.1/dist/js/tabulator.min.js"></script>
  <script>
    window.TIMESAVER_CONFIG = {
      appointmentsApi: "{{ api_url }}",
      userName: "{{ user_name|e }}",
    };
  </script>
  <script src="{{ url_for('static', filename='js/agenda.js') }}"></script>
</body>
</html>
